<!DOCTYPE html>
<html>
    <h1>
    Registrar's Office
    </h1>
    <h2>
    Class Search
    </h2>
    <hr>
    <form method="get">
        Dept:
        <input type="text" name="dept" autofocus> <br>
        Number:
        <input type="text" name="coursenum" autofocus><br>
        Area:
        <input type="text" name="area" autofocus><br>
        Title:
        <input type="text" name="title" autofocus><br>
        <input type="submit" value="Go">
    </form>
    <hr>
    <table border="1">
        <tr>
            <th>ClassId</th>
            <th>Dept</th>
            <th>Num</th>
            <th>Area</th>
            <th>Title</th>
        </tr>
        {%for class in table%}
            <tr>
                <th>class[0]</th>
                <th>class[1]</th>
                <th>class[2]</th>
                <th>class[3]/th>
                <th>class[4]</th>
            </tr>
            {%endfor%}
    
    </table>
<html>
