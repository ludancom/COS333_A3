<!DOCTYPE html>
<html>
    <h1>
    Registrar's Office
    </h1>
    <h2>
    Class Search
    </h2>
    <hr>
    <form action="/searchresults" method="get">
    <table>
        <tr>
            <td align="right">Dept:</td>
            <td><input type="text" name="dept" autofocus> <td>
        </tr>
        <tr>
            <td align="right">Number:</td>
            <td><input type="text" name="coursenum" autofocus></td>

        </tr>
        <tr>
            <td align="right">Area:</td>
            <td><input type="text" name="area" autofocus><br></td>  
        </tr>
        <tr>
            <td align="right">Title:</td>
            <td><input type="text" name="title" autofocus></td>
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" value="Go"></td>
        </tr>
        
    </table>
    
    </form>
    
    <hr>
    <table border="1">
        <tr>
            <td><strong>ClassId</strong></td>
            <td><strong>Dept</strong></td>
            <td><strong>Num</strong></td>
            <td><strong>Area</strong></td>
            <td><strong>Title</strong></td>
        </tr>
        {%for class in table%}
            <tr>
                <td><a href="/details?classid={{ class[0] }}">{{class[0]}}</a></td>
                <td>{{class[1]}}</td>
                <td>{{class[2]}}</td>
                <td>{{class[3]}}</td>
                <td>{{class[4]}}</td>
            </tr>
        {%endfor%}
    </table>
<html>
